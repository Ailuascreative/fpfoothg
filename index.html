<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Photography — Ailuascreative</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--white:#FFFFFF;--off:#F7F7F5;--g1:#EFEFED;--g2:#D4D4D0;--g3:#9C9C98;--g4:#5C5C58;--black:#141412;--gap:10px;--accent:#141412}
html{scroll-behavior:smooth}
body{font-family:'Poppins',sans-serif;background:var(--white);color:var(--black);min-height:100vh;overflow-x:hidden}
header{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,255,255,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--g1)}
.hd-main{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;gap:1rem}
.hd-left{display:flex;align-items:center;gap:1rem}
.hd-back{width:32px;height:32px;border-radius:50%;border:1px solid var(--g2);background:transparent;display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--g4);transition:all 0.18s;flex-shrink:0}
.hd-back:hover{border-color:var(--black);color:var(--black);background:var(--g1)}
.hd-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.hd-brand{font-size:1rem;font-weight:700;letter-spacing:-0.04em;color:var(--black);text-decoration:none}
.hd-brand span{font-weight:300;color:var(--g3)}
.hd-sep{width:1px;height:18px;background:var(--g2)}
.hd-section{font-size:0.7rem;color:var(--g3);letter-spacing:0.06em;text-transform:uppercase}
.hd-right{display:flex;align-items:center;gap:0.7rem}
.hd-count{font-size:0.66rem;color:var(--g3);letter-spacing:0.04em}
.hd-mail{display:inline-flex;align-items:center;gap:7px;font-family:'Poppins',sans-serif;font-size:0.68rem;font-weight:500;letter-spacing:0.03em;padding:0.38rem 1rem;border-radius:100px;background:var(--black);color:white;border:none;text-decoration:none;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.hd-mail:hover{background:#333;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,0.12)}
.hd-mail svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.hd-filter{display:flex;align-items:center;gap:6px;padding:0 2rem 0.65rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hd-filter::-webkit-scrollbar{display:none}
.f-btn{font-family:'Poppins',sans-serif;font-size:0.66rem;font-weight:500;letter-spacing:0.04em;padding:0.28rem 0.85rem;border:1px solid var(--g2);background:transparent;color:var(--g4);border-radius:100px;cursor:pointer;white-space:nowrap;transition:all 0.18s}
.f-btn:hover{border-color:var(--black);color:var(--black)}
.f-btn.on{background:var(--black);border-color:var(--black);color:white}
.hero-strip{margin-top:88px;padding:3rem 2rem 2rem;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;border-bottom:1px solid var(--g1)}
.hs-label{font-size:0.6rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--g3);margin-bottom:0.4rem}
.hs-heading{font-size:clamp(2rem,5vw,3.4rem);font-weight:300;letter-spacing:-0.04em;line-height:1;color:var(--black)}
.hs-heading em{font-style:italic;color:var(--g3)}
.hs-meta{text-align:right}
.hs-num{font-size:2.2rem;font-weight:200;letter-spacing:-0.05em;color:var(--black);line-height:1}
.hs-unit{font-size:0.58rem;color:var(--g3);letter-spacing:0.12em;text-transform:uppercase;margin-top:0.15rem}
.gallery-wrap{padding:var(--gap);columns:4 260px;column-gap:var(--gap)}
@media(max-width:900px){.gallery-wrap{columns:3 200px}}
@media(max-width:580px){.gallery-wrap{columns:2 150px}}
@media(max-width:340px){.gallery-wrap{columns:1}}
.photo-item{break-inside:avoid;margin-bottom:var(--gap);position:relative;overflow:hidden;background:var(--g1);cursor:pointer;opacity:0;transform:translateY(14px);animation:pgUp 0.45s ease forwards}
@keyframes pgUp{to{opacity:1;transform:translateY(0)}}
.photo-item img{width:100%;height:auto;display:block;transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94)}
.photo-item:hover img{transform:scale(1.05)}
.photo-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.52) 0%,transparent 52%);opacity:0;transition:opacity 0.3s;display:flex;flex-direction:column;justify-content:flex-end;padding:0.85rem}
.photo-item:hover .photo-ov{opacity:1}
.ov-cap{color:white;font-size:0.7rem;font-weight:400;line-height:1.35}
.ov-tag{font-size:0.56rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-top:0.25rem}
.photo-acts{position:absolute;top:0.6rem;right:0.6rem;display:flex;gap:5px;opacity:0;transition:opacity 0.22s}
.photo-item:hover .photo-acts{opacity:1}
.act-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;text-decoration:none}
.act-btn:hover{background:white}
.act-btn svg{width:12px;height:12px;stroke:#141412;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.contact-section{padding:4rem 2rem 5rem;border-top:1px solid var(--g1);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:2rem}
.cs-heading{font-size:1.4rem;font-weight:300;letter-spacing:-0.03em;color:var(--black);margin-bottom:0.8rem}
.cs-subs{display:flex;flex-direction:column;gap:0.45rem}
.cs-row{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:var(--g4)}
.cs-row svg{width:15px;height:15px;stroke:var(--g3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.cs-row a{color:var(--g4);text-decoration:none;transition:color 0.18s}
.cs-row a:hover{color:var(--black)}
.cs-btn{display:inline-flex;align-items:center;gap:9px;padding:0.9rem 2rem;background:var(--black);color:white;text-decoration:none;border-radius:100px;font-size:0.75rem;font-weight:500;letter-spacing:0.04em;transition:all 0.22s;white-space:nowrap}
.cs-btn:hover{background:#333;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.14)}
.cs-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
footer{border-top:1px solid var(--g1);padding:1.4rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.f-brand{font-size:0.85rem;font-weight:700;letter-spacing:-0.04em;color:var(--black)}
.f-brand span{font-weight:300;color:var(--g3)}
.f-copy{font-size:0.6rem;color:var(--g3);letter-spacing:0.04em}
#lb{position:fixed;inset:0;z-index:1000;background:rgba(12,12,10,0.96);display:none;flex-direction:column}
#lb.open{display:flex;animation:lbIn 0.2s ease}
@keyframes lbIn{from{opacity:0}to{opacity:1}}
.lb-top{position:absolute;top:0;left:0;right:0;z-index:5;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent)}
.lb-cap{font-size:0.78rem;font-weight:400;color:rgba(255,255,255,0.82);letter-spacing:0.01em}
.lb-inf{font-size:0.6rem;color:rgba(255,255,255,0.35);letter-spacing:0.08em;margin-top:2px}
.lb-tools{display:flex;gap:0.4rem}
.lb-tbtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.7);transition:all 0.15s}
.lb-tbtn:hover{background:rgba(255,255,255,0.18);color:white}
.lb-tbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.lb-stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:56px 72px 104px;overflow:hidden}
#lb-img{max-width:100%;max-height:100%;object-fit:contain;display:block;transition:opacity 0.18s,transform 0.18s;user-select:none;pointer-events:none}
#lb-img.sw{opacity:0;transform:scale(0.97)}
.lb-arr{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.7);transition:all 0.18s;z-index:5}
.lb-arr:hover{background:rgba(255,255,255,0.2);color:white}
.lb-arr svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.lb-arr.p{left:0.8rem}.lb-arr.n{right:0.8rem}
.lb-strip{position:absolute;bottom:0;left:0;right:0;padding:0.6rem 1rem;background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;align-items:center;justify-content:center}
.lb-strip::-webkit-scrollbar{display:none}
.lb-th{width:50px;height:34px;object-fit:cover;flex-shrink:0;cursor:pointer;opacity:0.35;outline:2px solid transparent;outline-offset:1px;transition:opacity 0.15s,outline-color 0.15s}
.lb-th:hover{opacity:0.7}
.lb-th.on{opacity:1;outline-color:white}
.lb-ctr{position:absolute;bottom:46px;left:50%;transform:translateX(-50%);font-size:0.6rem;color:rgba(255,255,255,0.32);letter-spacing:0.1em}
@media(max-width:600px){.lb-stage{padding:56px 48px 72px}.lb-strip{display:none}.lb-ctr{bottom:12px}.hd-section,.hd-sep{display:none}.hs-meta{display:none}}
</style>
</head>
<body>

    <div class="hd-left">

<script>
const PHOTOS = [
  {src:"https://images.unsplash.com/photo-1772362350668-1ecd3c3ab8d3?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",caption:"City View",tag:"abstract"},
  {src:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=1170&auto=format&fit=crop",caption:"Mountain Mist",tag:"landscape"},
  {src:"https://images.unsplash.com/photo-1500259571355-332da5cb07aa?q=80&w=987&auto=format&fit=crop",caption:"Ocean Horizon",tag:"landscape"},
  {src:"https://images.unsplash.com/photo-1494522855154-9297ac14b55f?q=80&w=1170&auto=format&fit=crop",caption:"Sunset Ridge",tag:"landscape"},
  {src:"https://images.unsplash.com/photo-1531366936337-7c912a4589a7?q=80&w=1170&auto=format&fit=crop",caption:"Northern Lights",tag:"landscape"},
  {src:"https://images.unsplash.com/photo-1758951995614-1a223f1512e4?q=80&w=1176&auto=format&fit=crop",caption:"Golden Hour",tag:"landscape"},
  {src:"https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1170&auto=format&fit=crop",caption:"Starfield",tag:"landscape"},
  {src:"https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?q=80&w=928&auto=format&fit=crop",caption:"Soft Light",tag:"portrait"},
  {src:"https://images.unsplash.com/photo-1508739773434-c26b3d09e071?q=80&w=1170&auto=format&fit=crop",caption:"Morning Portrait",tag:"portrait"},
  {src:"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=800&auto=format&fit=crop",caption:"Golden Ratio",tag:"portrait"},
  {src:"https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?q=80&w=1176&auto=format&fit=crop",caption:"Wild Bloom",tag:"nature"},
  {src:"https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1171&auto=format&fit=crop",caption:"Forest Path",tag:"nature"},
  {src:"https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?q=80&w=1170&auto=format&fit=crop",caption:"Shoreline",tag:"nature"},
  {src:"https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=1144&auto=format&fit=crop",caption:"City at Dusk",tag:"city"},
  {src:"https://images.unsplash.com/photo-1444723121867-7a241cacace9?q=80&w=1170&auto=format&fit=crop",caption:"Urban Geometry",tag:"city"},
  {src:"https://images.unsplash.com/photo-1519125323398-675f0ddb6308?q=80&w=1170&auto=format&fit=crop",caption:"Quiet Street",tag:"city"},
  {src:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?q=80&w=1170&auto=format&fit=crop",caption:"Abstract Form",tag:"abstract"},
  {src:"https://images.unsplash.com/photo-1487309078313-fad80c3ec1e5?q=80&w=1170&auto=format&fit=crop",caption:"Light Trails",tag:"abstract"}
];
const CATS=["landscape","portrait","nature","city","abstract"];
let activeTag = "all";
let visible=[],lbIdx=0,ssTimer=null,ssOn=false,thumbsBuilt=false;
function buildFilters(){
  const el=document.getElementById('hd-filter');el.innerHTML='';
  const mk=(label,tag)=>{const b=document.createElement('button');b.className='f-btn'+(activeTag===tag?' on':'');b.textContent=label;b.onclick=()=>{activeTag=tag;buildFilters();render();};el.appendChild(b);};
  mk('All','all');CATS.forEach(c=>mk(c.charAt(0).toUpperCase()+c.slice(1),c));
}
function render(){
  visible=activeTag==='all'?[...PHOTOS]:PHOTOS.filter(p=>p.tag===activeTag);
  document.getElementById('hd-count').textContent=visible.length+' foto';
  document.getElementById('hs-num').textContent=visible.length;
  const g=document.getElementById('gallery');g.innerHTML='';thumbsBuilt=false;
  visible.forEach((p,i)=>{
    const d=document.createElement('div');d.className='photo-item';d.style.animationDelay=Math.min(i,8)*55+'ms';
    d.innerHTML=`<img src="${p.src}" alt="${p.caption}" loading="${i<8?'eager':'lazy'}"/><div class="photo-ov"><div class="ov-cap">${p.caption}</div><div class="ov-tag">${p.tag}</div></div><div class="photo-acts"><button class="act-btn"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button><a href="${p.src}" target="_blank" class="act-btn" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a></div>`;
    d.addEventListener('click',()=>openLb(i));g.appendChild(d);
  });
}
function openLb(i){lbIdx=i;buildThumbs();setLbPhoto(false);document.getElementById('lb').classList.add('open');document.body.style.overflow='hidden';}
function closeLb(){document.getElementById('lb').classList.remove('open');document.body.style.overflow='';stopSS();}
function setLbPhoto(anim){
  const p=visible[lbIdx];const img=document.getElementById('lb-img');
  if(anim){img.classList.add('sw');setTimeout(()=>{img.src=p.src;img.classList.remove('sw');},160);}else{img.src=p.src;}
  document.getElementById('lb-cap').textContent=p.caption;
  document.getElementById('lb-inf').textContent=p.tag.charAt(0).toUpperCase()+p.tag.slice(1)+' — Ailuascreative';
  document.getElementById('lb-ctr').textContent=(lbIdx+1)+' / '+visible.length;
  document.querySelectorAll('.lb-th').forEach((t,i)=>t.classList.toggle('on',i===lbIdx));
  const a=document.querySelector('.lb-th.on');if(a)a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}
function buildThumbs(){
  if(thumbsBuilt)return;const s=document.getElementById('lb-strip');s.innerHTML='';
  visible.forEach((p,i)=>{const img=document.createElement('img');img.className='lb-th'+(i===lbIdx?' on':'');img.src=p.src+'&w=120';img.loading='lazy';img.addEventListener('click',()=>{lbIdx=i;setLbPhoto(true);});s.appendChild(img);});
  thumbsBuilt=true;
}
function lbNav(d){lbIdx=(lbIdx+d+visible.length)%visible.length;setLbPhoto(true);}
function startSS(){ssOn=true;ssTimer=setInterval(()=>lbNav(1),3500);document.getElementById('lb-ss-btn').innerHTML='<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';}
function stopSS(){ssOn=false;clearInterval(ssTimer);const b=document.getElementById('lb-ss-btn');if(b)b.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';}
function toggleSS(){ssOn?stopSS():startSS();}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='ArrowRight')lbNav(1);if(e.key==='ArrowLeft')lbNav(-1);
  if(e.key==='Escape')closeLb();if(e.key===' '){e.preventDefault();toggleSS();}
});
let tx=0;
document.getElementById('lb').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.getElementById('lb').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)lbNav(dx<0?1:-1);});
buildFilters();render();
</script>
